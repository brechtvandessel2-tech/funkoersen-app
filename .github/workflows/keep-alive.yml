name: Keep Alive

on:
  schedule:
    # Dit draait elke 1e dag van de maand om 00:00 UTC
    - cron: '0 0 1 * *'
  workflow_dispatch:

jobs:
  keep-alive:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Create a dummy change and commit
        run: |
          date > keep_alive.txt
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add keep_alive.txt
          git commit -m "chore: keep-alive activity commit" || exit 0
          git push
